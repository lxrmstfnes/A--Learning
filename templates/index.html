<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG 知识库问答</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --hit-bg: #f8fafc;
      --assistant-bg: #eff6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    header {
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    header p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .toolbar label {
      font-size: 0.875rem;
      color: var(--muted);
    }
    select, button, textarea {
      font: inherit;
    }
    select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .status.error { color: #dc2626; }
    .chat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 420px;
      max-height: 65vh;
      overflow-y: auto;
      padding: 16px;
      margin-bottom: 16px;
    }
    .empty-tip {
      color: var(--muted);
      text-align: center;
      padding: 80px 20px;
      font-size: 0.95rem;
    }
    .message { margin-bottom: 20px; }
    .message-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .bubble {
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-user {
      background: #f1f5f9;
    }
    .bubble-assistant {
      background: var(--assistant-bg);
    }
    .hits-block {
      margin: 10px 0 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .hits-header {
      background: var(--hit-bg);
      padding: 10px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .hit-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .hit-item:last-child { border-bottom: none; }
    .hit-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .hit-meta strong { color: var(--text); }
    .hit-preview { color: var(--text); line-height: 1.5; }
    .input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 80px;
      max-height: 160px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG 知识库问答</h1>
      <p>先展示检索到的相关向量，再生成严谨回答</p>
    </header>

    <div class="toolbar">
      <label for="mode">知识库模式</label>
      <select id="mode"></select>
      <button class="btn btn-ghost" id="clearBtn">清空对话</button>
      <span class="status" id="status"></span>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="empty-tip" id="emptyTip">选择模式后，在下方输入问题开始对话</div>
    </div>

    <div class="input-area">
      <textarea id="queryInput" placeholder="请输入您的问题…" rows="3"></textarea>
      <button class="btn btn-primary" id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const modeSelect = document.getElementById("mode");
    const chatBox = document.getElementById("chatBox");
    const emptyTip = document.getElementById("emptyTip");
    const queryInput = document.getElementById("queryInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");

    let loading = false;

    async function loadModes() {
      const res = await fetch("/api/modes");
      const data = await res.json();
      modeSelect.innerHTML = "";
      data.modes.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m.id;
        const count = m.vector_count != null ? ` · ${m.vector_count} 向量` : "";
        const ready = m.ready ? "" : "（未构建）";
        opt.textContent = `${m.label}${count}${ready}`;
        opt.disabled = !m.ready;
        modeSelect.appendChild(opt);
      });
      updateStatus();
    }

    function updateStatus() {
      const opt = modeSelect.selectedOptions[0];
      if (!opt || opt.disabled) {
        statusEl.textContent = "当前模式索引未就绪，请先构建向量库";
        statusEl.className = "status error";
        sendBtn.disabled = true;
      } else {
        statusEl.textContent = `当前: ${opt.textContent}`;
        statusEl.className = "status";
        sendBtn.disabled = loading;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderHits(hits, modeLabel) {
      if (!hits || hits.length === 0) {
        return `<div class="hits-block"><div class="hits-header">检索结果 · ${escapeHtml(modeLabel)} · 未命中相关向量</div></div>`;
      }
      const items = hits.map((h) => `
        <div class="hit-item">
          <div class="hit-meta">
            <span><strong>#${h.rank}</strong></span>
            <span>向量ID=${h.vector_id}</span>
            <span>相似度=${h.score}</span>
            <span>${escapeHtml(h.display_name || "")}</span>
            ${h.location && h.location !== "—" ? `<span>${escapeHtml(h.location)}</span>` : ""}
          </div>
          ${h.summary ? `<div class="hit-meta" style="margin-bottom:4px">摘要: ${escapeHtml(h.summary)}</div>` : ""}
          <div class="hit-preview">${escapeHtml(h.preview || "")}</div>
        </div>
      `).join("");
      return `<div class="hits-block"><div class="hits-header">检索结果 · ${escapeHtml(modeLabel)} · 共 ${hits.length} 条</div>${items}</div>`;
    }

    function appendTurn(query, hits, answer, modeLabel) {
      emptyTip.style.display = "none";
      const wrap = document.createElement("div");
      wrap.className = "message";
      wrap.innerHTML = `
        <div class="message-label">您</div>
        <div class="bubble bubble-user">${escapeHtml(query)}</div>
        ${renderHits(hits, modeLabel)}
        <div class="message-label">助手</div>
        <div class="bubble bubble-assistant">${escapeHtml(answer)}</div>
      `;
      chatBox.appendChild(wrap);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendQuery() {
      const query = queryInput.value.trim();
      if (!query || loading) return;

      loading = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>思考中';

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, mode: modeSelect.value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "请求失败");
        appendTurn(data.query, data.hits, data.answer, data.mode_label);
        queryInput.value = "";
      } catch (err) {
        alert(err.message || "出错了");
      } finally {
        loading = false;
        sendBtn.textContent = "发送";
        updateStatus();
      }
    }

    clearBtn.addEventListener("click", async () => {
      await fetch("/api/clear", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode: modeSelect.value }),
      });
      chatBox.innerHTML = "";
      chatBox.appendChild(emptyTip);
      emptyTip.style.display = "block";
    });

    sendBtn.addEventListener("click", sendQuery);
    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });
    modeSelect.addEventListener("change", updateStatus);

    loadModes();
  </script>
</body>
</html>
